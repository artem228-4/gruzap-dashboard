<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>ГРУЗАП · Аналитика</title>
  <style>
    :root {
      --bg-primary: #1c1c1e; --bg-secondary: #2c2c2e; --bg-tertiary: #3a3a3c;
      --text-primary: #f5f5f5; --text-secondary: #a0a0a0; --text-tertiary: #6b6b6b;
      --border: rgba(255,255,255,0.08); --radius-md: 8px; --radius-lg: 12px; --accent: #FF5000;
    }
    @media (prefers-color-scheme: light) {
      :root {
        --bg-primary: #ffffff; --bg-secondary: #f5f4f2; --bg-tertiary: #eceae6;
        --text-primary: #1a1a1a; --text-secondary: #6b6b6b; --text-tertiary: #a0a0a0;
        --border: rgba(0,0,0,0.08);
      }
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg-secondary); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; color: var(--text-primary); min-height: 100vh; }
    .dash { padding: 16px; display: flex; flex-direction: column; gap: 12px; max-width: 1400px; margin: 0 auto; }

    /* HEADER */
    .dash-header { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; }
    .brand { display: flex; align-items: center; gap: 9px; }
    .brand-name { font-size: 15px; font-weight: 600; letter-spacing: 1.5px; }
    .brand-sub { font-size: 13px; color: var(--text-secondary); }
    .header-right { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }

    /* PRESET BUTTONS */
    .preset-group { display: flex; background: var(--bg-secondary); border: 0.5px solid var(--border); border-radius: var(--radius-md); overflow: hidden; }
    .preset-btn { padding: 7px 11px; font-size: 12px; font-weight: 500; color: var(--text-secondary); cursor: pointer; border: none; background: transparent; transition: background 0.15s, color 0.15s; white-space: nowrap; }
    .preset-btn:hover { background: var(--bg-primary); color: var(--text-primary); }
    .preset-btn.active { background: #FF5000; color: #fff; border-radius: 6px; }

    /* DATE PICKER */
    .dp-wrap { position: relative; }
    .dp-btn { display: flex; align-items: center; gap: 6px; padding: 7px 12px; font-size: 12px; font-weight: 500; background: var(--bg-primary); border: 0.5px solid var(--border); border-radius: var(--radius-md); cursor: pointer; color: var(--text-primary); transition: all 0.15s; white-space: nowrap; }
    .dp-btn:hover, .dp-btn.open { border-color: #FF5000; }
    .dp-popup { display: none; position: absolute; top: calc(100% + 8px); right: 0; background: var(--bg-primary); border: 0.5px solid var(--border); border-radius: 14px; box-shadow: 0 12px 40px rgba(0,0,0,0.18); z-index: 500; flex-direction: column; min-width: 620px; }
    .dp-popup.show { display: flex; }
    .dp-main { display: flex; }
    .dp-presets { display: flex; flex-direction: column; padding: 14px 10px; gap: 2px; border-right: 0.5px solid var(--border); min-width: 105px; }
    .dp-preset { padding: 8px 12px; font-size: 12px; color: var(--text-secondary); cursor: pointer; border: none; background: none; text-align: left; border-radius: 6px; transition: all 0.1s; }
    .dp-preset:hover { background: var(--bg-secondary); color: var(--text-primary); }
    .dp-preset.active { background: rgba(255,80,0,0.1); color: #FF5000; font-weight: 600; }
    .dp-cal { padding: 16px; flex: 1; }
    .dp-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .dp-nav-btn { width: 28px; height: 28px; border: none; background: none; cursor: pointer; color: var(--text-secondary); border-radius: 6px; font-size: 18px; display: flex; align-items: center; justify-content: center; transition: background 0.1s; }
    .dp-nav-btn:hover { background: var(--bg-secondary); }
    .dp-months { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .dp-mhead { font-size: 12px; font-weight: 600; text-align: center; margin-bottom: 8px; color: var(--text-primary); }
    .dp-grid { display: grid; grid-template-columns: repeat(7, 1fr); }
    .dp-dow { font-size: 10px; font-weight: 600; color: var(--text-tertiary); text-align: center; padding: 4px 0 6px; }
    .dp-day { font-size: 12px; text-align: center; padding: 5px 1px; cursor: pointer; border-radius: 4px; transition: background 0.08s; color: var(--text-primary); user-select: none; position: relative; }
    .dp-day:hover:not(.dp-other):not(.dp-future) { background: var(--bg-secondary); }
    .dp-other { color: var(--text-tertiary); cursor: default; }
    .dp-future { color: var(--text-tertiary); cursor: default; opacity: 0.4; }
    .dp-today { font-weight: 700; }
    .dp-inrange { background: rgba(255,80,0,0.1); border-radius: 0; }
    .dp-start { background: #FF5000 !important; color: #fff !important; font-weight: 600; border-radius: 4px 0 0 4px; }
    .dp-end { background: #FF5000 !important; color: #fff !important; font-weight: 600; border-radius: 0 4px 4px 0; }
    .dp-single { border-radius: 4px !important; }
    .dp-footer { display: flex; align-items: center; justify-content: space-between; padding: 10px 16px; border-top: 0.5px solid var(--border); }
    .dp-range-info { font-size: 12px; color: var(--text-secondary); }
    .dp-actions { display: flex; gap: 8px; }
    .dp-cancel { padding: 6px 14px; font-size: 12px; background: none; border: 0.5px solid var(--border); border-radius: 6px; cursor: pointer; color: var(--text-secondary); }
    .dp-apply { padding: 6px 16px; font-size: 12px; background: #FF5000; border: none; border-radius: 6px; cursor: pointer; color: #fff; font-weight: 600; }
    .dp-apply:hover { background: #e04600; }

    /* BADGES + BUTTONS */
    .live-badge { font-size: 11px; color: #639922; background: #EAF3DE; border: 0.5px solid #97C459; border-radius: 20px; padding: 5px 10px; display: flex; align-items: center; gap: 5px; white-space: nowrap; }
    .live-dot { width: 6px; height: 6px; border-radius: 50%; background: #639922; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    .date-label { font-size: 12px; color: var(--text-tertiary); }
    .refresh-btn { display: flex; align-items: center; gap: 6px; padding: 7px 13px; font-size: 12px; font-weight: 500; background: var(--bg-secondary); border: 0.5px solid var(--border); border-radius: var(--radius-md); cursor: pointer; color: var(--text-secondary); transition: all 0.15s; }
    .refresh-btn:hover { background: var(--bg-primary); color: #FF5000; border-color: #FF5000; }
    .refresh-btn.loading svg { animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .ai-btn { display: flex; align-items: center; gap: 6px; padding: 7px 14px; font-size: 12px; font-weight: 600; background: #FF5000; border: none; border-radius: var(--radius-md); cursor: pointer; color: #fff; transition: all 0.15s; }
    .ai-btn:hover { background: #e04600; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(255,80,0,0.35); }
    .ai-btn:disabled { background: #ccc; transform: none; box-shadow: none; cursor: not-allowed; }

    /* MODAL */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); z-index: 1000; align-items: center; justify-content: center; padding: 16px; }
    .modal-overlay.show { display: flex; }
    .modal { background: var(--bg-primary); border: 0.5px solid var(--border); border-radius: 16px; width: 100%; max-width: 560px; max-height: 85vh; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 20px 60px rgba(0,0,0,0.3); animation: modalIn 0.2s ease; }
    @keyframes modalIn { from{opacity:0;transform:scale(0.95) translateY(8px)} to{opacity:1;transform:scale(1) translateY(0)} }
    .modal-head { display: flex; align-items: center; gap: 10px; padding: 18px 20px 14px; border-bottom: 0.5px solid var(--border); }
    .modal-icon { width: 32px; height: 32px; background: #FF5000; border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .modal-title { font-size: 14px; font-weight: 600; flex: 1; }
    .modal-period { font-size: 11px; color: var(--text-tertiary); }
    .modal-close { width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; cursor: pointer; border-radius: 6px; color: var(--text-tertiary); background: none; border: none; font-size: 18px; transition: background 0.15s; }
    .modal-close:hover { background: var(--bg-secondary); }
    .modal-body { padding: 20px; overflow-y: auto; flex: 1; }
    .modal-loading { display: flex; flex-direction: column; align-items: center; gap: 14px; padding: 32px 0; color: var(--text-secondary); font-size: 13px; }
    .modal-loading-ring { width: 36px; height: 36px; border: 3px solid var(--bg-tertiary); border-top-color: #FF5000; border-radius: 50%; animation: spin 0.8s linear infinite; }
    .modal-text { font-size: 14px; line-height: 1.75; white-space: pre-wrap; }
    .modal-text strong, .modal-text b { font-weight: 600; }
    .modal-text h1, .modal-text h2, .modal-text h3 { font-size: 14px; font-weight: 700; margin: 12px 0 6px; }

    /* KPI GRID — 5 columns */
    .grid-top { display: grid; grid-template-columns: repeat(5, minmax(0,1fr)); gap: 10px; }
    .kpi { background: var(--bg-primary); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 16px; }
    .kpi-label { font-size: 10px; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 8px; }
    .kpi-value { font-size: 28px; font-weight: 600; line-height: 1; margin-bottom: 4px; }
    .kpi-sub { font-size: 11px; color: var(--text-tertiary); }

    /* MID GRID */
    .grid-mid { display: grid; grid-template-columns: minmax(0,1.5fr) minmax(0,1fr) minmax(0,1fr); gap: 10px; }
    .card { background: var(--bg-primary); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 16px; }
    .card-title { font-size: 10px; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 14px; }

    /* FUNNEL */
    .funnel-step { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
    .funnel-label { font-size: 12px; color: var(--text-primary); min-width: 130px; flex-shrink: 0; }
    .funnel-bar-wrap { flex: 1; background: var(--bg-secondary); border-radius: 4px; height: 28px; overflow: hidden; }
    .funnel-bar { height: 100%; border-radius: 4px; display: flex; align-items: center; padding-left: 10px; transition: width 0.6s ease; }
    .funnel-bar span { font-size: 13px; font-weight: 600; color: #fff; }
    .funnel-conv { font-size: 11px; color: var(--text-tertiary); min-width: 40px; text-align: right; }
    .conv-box { margin-top: 14px; background: var(--bg-secondary); border-radius: var(--radius-md); padding: 12px; text-align: center; }
    .conv-big { font-size: 32px; font-weight: 600; color: #FF5000; }
    .conv-label { font-size: 11px; color: var(--text-secondary); margin-top: 2px; }

    /* DONUT */
    .donut-wrap { display: flex; flex-direction: column; align-items: center; gap: 12px; }
    .legend-row { display: flex; align-items: center; gap: 8px; width: 100%; }
    .legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .legend-name { font-size: 12px; color: var(--text-secondary); flex: 1; }
    .legend-val { font-size: 13px; font-weight: 600; }
    .legend-pct { font-size: 11px; color: var(--text-tertiary); min-width: 32px; text-align: right; }

    /* CHURN */
    .churn-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
    .churn-label { font-size: 11px; color: var(--text-secondary); width: 105px; flex-shrink: 0; }
    .churn-wrap { flex: 1; background: var(--bg-secondary); border-radius: 3px; height: 22px; overflow: hidden; }
    .churn-bar { height: 100%; border-radius: 3px; display: flex; align-items: center; padding-left: 8px; transition: width 0.6s ease; }
    .churn-num { font-size: 11px; font-weight: 600; color: #fff; }
    .churn-total { font-size: 11px; color: var(--text-tertiary); min-width: 24px; text-align: right; }
    .health-block { margin-top: 14px; padding-top: 12px; border-top: 0.5px solid var(--border); }
    .health-title { font-size: 11px; color: var(--text-secondary); margin-bottom: 4px; }
    .health-score { font-size: 24px; font-weight: 600; }
    .health-label { font-size: 11px; color: var(--text-tertiary); margin-top: 2px; }

    /* TABLE */
    .table-section { background: var(--bg-primary); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 16px; }
    .tbl-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; flex-wrap: wrap; gap: 6px; }
    table { width: 100%; border-collapse: collapse; }
    th { font-size: 10px; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.7px; text-align: left; padding: 8px 10px; border-bottom: 0.5px solid var(--border); cursor: pointer; user-select: none; white-space: nowrap; }
    th:hover { color: var(--text-primary); }
    th.sorted { color: #FF5000; }
    td { font-size: 13px; padding: 9px 10px; border-bottom: 0.5px solid var(--border); }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--bg-secondary); }
    td.num { text-align: right; font-variant-numeric: tabular-nums; }

    /* GEO + SOURCES ROW */
    .grid-extra { display: grid; grid-template-columns: minmax(0,1fr) minmax(0,1fr); gap: 10px; }
    .geo-row { display: flex; align-items: center; gap: 8px; margin-bottom: 9px; }
    .geo-rank { font-size: 11px; color: var(--text-tertiary); min-width: 16px; text-align: right; }
    .geo-name { font-size: 12px; min-width: 90px; flex-shrink: 0; }
    .geo-bar-wrap { flex: 1; background: var(--bg-secondary); border-radius: 3px; height: 18px; overflow: hidden; }
    .geo-bar { height: 100%; border-radius: 3px; display: flex; align-items: center; padding-left: 7px; transition: width 0.6s ease; }
    .geo-bar span { font-size: 11px; font-weight: 600; color: #fff; white-space: nowrap; }

    /* MOBILE */
    @media (max-width: 900px) {
      .grid-top { grid-template-columns: repeat(3, minmax(0,1fr)); }
      .grid-mid { grid-template-columns: minmax(0,1fr) minmax(0,1fr); }
      .card:first-child { grid-column: 1/-1; }
      .dp-popup { min-width: 340px; }
      .dp-months { grid-template-columns: 1fr; }
    }
    @media (max-width: 640px) {
      .dash { padding: 12px; gap: 10px; }
      .grid-top { grid-template-columns: repeat(2, minmax(0,1fr)); gap: 8px; }
      .kpi-value { font-size: 22px; }
      .grid-mid { grid-template-columns: minmax(0,1fr); }
      .card:first-child { grid-column: auto; }
      .grid-extra { grid-template-columns: minmax(0,1fr); }
      .brand-sub { display: none; }
      .preset-group { display: none; }
      .live-badge { display: none; }
      .tbl-hint { display: none; }
      th { padding: 6px 8px; font-size: 10px; }
      td { padding: 7px 8px; font-size: 12px; }
      .mini-bar-wrap { display: none; }
      .dp-popup { position: fixed; inset: 0; border-radius: 0; min-width: unset; z-index: 900; }
      .dp-main { flex-direction: column; }
      .dp-presets { flex-direction: row; flex-wrap: wrap; border-right: none; border-bottom: 0.5px solid var(--border); }
      .ai-btn span { display: none; }
    }
  </style>
</head>
<body>
<div class="dash">

  <div class="dash-header">
    <div class="brand">
      <svg width="26" height="20" viewBox="0 0 184 147" fill="none">
        <path d="M39.3334 0L0 67.2985V146.187H70.0017L132.229 83.9106V145.95H183.019V43.8759H79.9713V67.3253H115.659L98.6717 84.3272H23.4345V73.6535L52.7763 23.4518H183.019V0H39.3334Z" fill="#FF5000"/>
      </svg>
      <span class="brand-name">ГРУЗАП</span>
      <span class="brand-sub">Аналитика</span>
    </div>
    <div class="header-right">
      <div class="preset-group" id="preset-group">
        <button class="preset-btn" data-preset="today" onclick="setPreset(this)">Сегодня</button>
        <button class="preset-btn" data-preset="yesterday" onclick="setPreset(this)">Вчера</button>
        <button class="preset-btn" data-preset="week" onclick="setPreset(this)">Неделя</button>
        <button class="preset-btn" data-preset="month" onclick="setPreset(this)">Месяц</button>
        <button class="preset-btn" data-preset="quarter" onclick="setPreset(this)">Квартал</button>
      </div>

      <div class="dp-wrap" id="dp-wrap">
        <button type="button" class="dp-btn" id="dp-btn" onclick="toggleDp(event)">
          <svg width="13" height="13" viewBox="0 0 16 16" fill="none"><rect x="1" y="2" width="14" height="13" rx="2" stroke="currentColor" stroke-width="1.3"/><path d="M1 6h14M5 1v2M11 1v2" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
          <span id="dp-label">вчера</span>
          <svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M2 3.5L5 6.5L8 3.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
        </button>

        <div class="dp-popup" id="dp-popup" onclick="event.stopPropagation()">
          <div class="dp-main">
            <div class="dp-presets">
              <button class="dp-preset" data-preset="today" onclick="dpPreset(this)">Сегодня</button>
              <button class="dp-preset" data-preset="yesterday" onclick="dpPreset(this)">Вчера</button>
              <button class="dp-preset" data-preset="week" onclick="dpPreset(this)">Неделя</button>
              <button class="dp-preset" data-preset="month" onclick="dpPreset(this)">Месяц</button>
              <button class="dp-preset" data-preset="quarter" onclick="dpPreset(this)">Квартал</button>
            </div>
            <div class="dp-cal">
              <div class="dp-nav">
                <button class="dp-nav-btn" onclick="dpNav(-1)">‹</button>
                <div class="dp-months">
                  <div id="dp-m0"></div>
                  <div id="dp-m1"></div>
                </div>
                <button class="dp-nav-btn" onclick="dpNav(1)">›</button>
              </div>
            </div>
          </div>
          <div class="dp-footer">
            <span class="dp-range-info" id="dp-range-info"></span>
            <div class="dp-actions">
              <button class="dp-cancel" onclick="closeDp()">Отмена</button>
              <button class="dp-apply" onclick="applyDp()">Применить</button>
            </div>
          </div>
        </div>
      </div>

      <div class="live-badge"><div class="live-dot"></div>AppMetrica</div>
      <button class="ai-btn" id="ai-btn" onclick="openAnalytics()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M12 2L9.5 9.5 2 12l7.5 2.5L12 22l2.5-7.5L22 12l-7.5-2.5z" fill="currentColor"/></svg>
        <span>Аналитика</span>
      </button>
      <button class="refresh-btn" id="refresh-btn" onclick="triggerRefresh()">
        <svg width="13" height="13" viewBox="0 0 16 16" fill="none"><path d="M13.65 2.35A8 8 0 1 0 15 8h-2a6 6 0 1 1-1.06-3.35L10 7h5V2l-1.35.35Z" fill="currentColor"/></svg>
        Обновить
      </button>
    </div>
  </div>

  <div><span class="date-label" id="period-label-text"></span></div>

  <div class="grid-top" id="kpi-grid"></div>

  <div class="grid-mid">
    <div class="card">
      <div class="card-title">Воронка поиска работы</div>
      <div id="funnel"></div>
      <div class="conv-box">
        <div class="conv-big" id="conv-rate">—</div>
        <div class="conv-label">водителей, которые нашли работу и позвонили</div>
      </div>
    </div>
    <div class="card">
      <div class="card-title">Какие маршруты ищут водители</div>
      <div class="donut-wrap">
        <svg width="120" height="120" viewBox="0 0 120 120" id="donut-svg"></svg>
        <div id="donut-legend" style="width:100%;display:flex;flex-direction:column;gap:8px;"></div>
      </div>
    </div>
    <!-- churn card hidden until real metric is ready
    <div class="card">
      <div class="card-title">Водители, уходящие из приложения</div>
      <div id="churn-bars"></div>
      <div class="health-block">
        <div class="health-title">Остаются в приложении</div>
        <div class="health-score" id="health-score">—</div>
        <div class="health-label" id="health-label"></div>
      </div>
    </div>
    -->
  </div>

  <div class="grid-extra">
    <div class="card">
      <div class="card-title">Откуда водители</div>
      <div id="geo-content"><div style="font-size:12px;color:var(--text-tertiary)">Загрузка…</div></div>
    </div>
    <div class="card">
      <div class="card-title">Источники установок</div>
      <div id="sources-content"><div style="font-size:12px;color:var(--text-tertiary)">Загрузка…</div></div>
    </div>
  </div>

  <div class="table-section">
    <div class="tbl-header">
      <div class="card-title" style="margin-bottom:0;">Все события <span id="tbl-summary" style="color:var(--text-tertiary);font-weight:400;"></span></div>
      <span class="tbl-hint" style="font-size:11px;color:var(--text-tertiary);">Нажмите столбец для сортировки</span>
    </div>
    <div style="overflow-x:auto;"><table id="data-table"></table></div>
  </div>

</div>

<div class="modal-overlay" id="modal-overlay" onclick="closeModalOutside(event)">
  <div class="modal">
    <div class="modal-head">
      <div class="modal-icon">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M12 2L9.5 9.5 2 12l7.5 2.5L12 22l2.5-7.5L22 12l-7.5-2.5z" fill="#fff"/></svg>
      </div>
      <div>
        <div class="modal-title">Анализ данных</div>
        <div class="modal-period" id="modal-period-label"></div>
      </div>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body" id="modal-body">
      <div class="modal-loading"><div class="modal-loading-ring"></div>Собираю данные и анализирую…</div>
    </div>
  </div>
</div>

<script>
// ===== DATE UTILITIES =====
const MONTHS_SHORT = ['янв','фев','мар','апр','май','июн','июл','авг','сен','окт','ноя','дек'];
const MONTHS_FULL  = ['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
const DOW_SHORT    = ['Пн','Вт','Ср','Чт','Пт','Сб','Вс'];

function today0() { const d = new Date(); d.setHours(0,0,0,0); return d; }
function addDays(d, n) { const r = new Date(d); r.setDate(r.getDate()+n); return r; }
function fmtISO(d) { const y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,'0'),dd=String(d.getDate()).padStart(2,'0'); return `${y}-${m}-${dd}`; }
function fmtFriendly(d) { return d.getDate() + ' ' + MONTHS_SHORT[d.getMonth()]; }
function sameDay(a,b) { return a.toDateString() === b.toDateString(); }
function daysBetween(a,b) { return Math.round(Math.abs(b-a)/864e5)+1; }
function rangeLabel(a,b) {
  const lo = a<b?a:b, hi = a<b?b:a;
  const d = daysBetween(lo,hi);
  const s = fmtFriendly(lo)===fmtFriendly(hi) ? fmtFriendly(lo) : fmtFriendly(lo)+' — '+fmtFriendly(hi);
  return s + ' · ' + d + (d===1?' день':d<5?' дня':' дней');
}

// ===== DATE PICKER STATE =====
const DP = {
  from: addDays(today0(), -1),
  to:   addDays(today0(), -1),
  tFrom: null, tTo: null, hover: null,
  stage: 0,  // 0=idle, 1=awaiting end click
  vy: 0, vm: 0  // view: left-month year+month
};
(function initDpView() {
  const t = today0();
  DP.vy = t.getFullYear();
  DP.vm = t.getMonth() - 1;
  if (DP.vm < 0) { DP.vm = 11; DP.vy--; }
})();

function dpLabelText() {
  if (sameDay(DP.from, DP.to)) return fmtFriendly(DP.from);
  return fmtFriendly(DP.from) + ' — ' + fmtFriendly(DP.to);
}

function toggleDp(e) {
  if (e) e.stopPropagation();
  const popup = document.getElementById('dp-popup');
  const btn   = document.getElementById('dp-btn');
  if (popup.classList.contains('show')) {
    closeDp();
  } else {
    DP.tFrom = DP.from; DP.tTo = DP.to; DP.stage = 0; DP.hover = null;
    DP.vy = DP.from.getFullYear(); DP.vm = DP.from.getMonth()-1;
    if (DP.vm < 0) { DP.vm = 11; DP.vy--; }
    popup.classList.add('show');
    btn.classList.add('open');
    renderDp();
    updateDpRangeInfo();
  }
}

function closeDp() {
  document.getElementById('dp-popup').classList.remove('show');
  document.getElementById('dp-btn').classList.remove('open');
}

function applyDp() {
  if (!DP.tFrom) return;
  const end = DP.tTo || DP.hover || DP.tFrom;
  const lo = DP.tFrom < end ? DP.tFrom : end;
  const hi = DP.tFrom < end ? end : DP.tFrom;
  DP.from = lo; DP.to = hi;
  document.getElementById('dp-label').textContent = dpLabelText();
  // clear active preset highlight
  document.querySelectorAll('.dp-preset,.preset-btn').forEach(b=>b.classList.remove('active'));
  closeDp();
  triggerRefresh();
}

function dpPreset(btn) {
  const key = btn.getAttribute('data-preset');
  applyPreset(key);
  document.querySelectorAll('.dp-preset').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderDp(); updateDpRangeInfo();
}

function setPreset(btn) {
  const key = btn.getAttribute('data-preset');
  applyPreset(key);
  document.querySelectorAll('.preset-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('dp-label').textContent = dpLabelText();
  triggerRefresh();
}

function applyPreset(key) {
  const t = today0(), y = addDays(t,-1);
  const map = {
    today:     [t, t],
    yesterday: [y, y],
    week:      [addDays(t,-7), y],
    month:     [addDays(t,-30), y],
    quarter:   [new Date(t.getFullYear(), Math.floor(t.getMonth()/3)*3, 1), t],
  };
  const [from, to] = map[key] || [y, y];
  DP.from = from; DP.to = to;
  DP.tFrom = from; DP.tTo = to; DP.stage = 0;
}

function dpNav(dir) {
  DP.vm += dir;
  if (DP.vm > 11) { DP.vm = 0; DP.vy++; }
  if (DP.vm < 0)  { DP.vm = 11; DP.vy--; }
  renderDp();
}

function updateDpRangeInfo() {
  const from = DP.tFrom, to = DP.tTo || DP.hover || DP.tFrom;
  if (!from) return;
  const lo = from<to?from:to, hi = from<to?to:from;
  document.getElementById('dp-range-info').textContent = rangeLabel(lo, hi);
}

function renderDp() {
  const rm = DP.vm+1 > 11 ? 0 : DP.vm+1;
  const ry = DP.vm+1 > 11 ? DP.vy+1 : DP.vy;
  renderDpMonth('dp-m0', DP.vy, DP.vm);
  renderDpMonth('dp-m1', ry, rm);
}

function renderDpMonth(id, year, month) {
  const el = document.getElementById(id);
  const firstDow = (new Date(year, month, 1).getDay() + 6) % 7;
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const daysInPrev  = new Date(year, month, 0).getDate();
  const todayD = today0();

  const from = DP.tFrom, to = DP.tTo || DP.hover;
  const lo = (from && to) ? (from<to?from:to) : from;
  const hi = (from && to) ? (from<to?to:from) : null;

  let html = `<div class="dp-mhead">${MONTHS_FULL[month]} ${year}</div><div class="dp-grid">`;
  DOW_SHORT.forEach(d => { html += `<div class="dp-dow">${d}</div>`; });

  for (let i=firstDow-1; i>=0; i--) html += `<div class="dp-day dp-other">${daysInPrev-i}</div>`;

  for (let d=1; d<=daysInMonth; d++) {
    const date = new Date(year, month, d);
    const future = date > todayD;
    const isStart = lo && sameDay(date, lo);
    const isEnd   = hi && sameDay(date, hi);
    const inRange = lo && hi && date>lo && date<hi;
    const single  = isStart && isEnd;
    let cls = 'dp-day';
    if (future) cls += ' dp-future';
    if (sameDay(date, todayD)) cls += ' dp-today';
    if (inRange) cls += ' dp-inrange';
    if (isStart && !single) cls += ' dp-start';
    if (isEnd && !single)   cls += ' dp-end';
    if (single)             cls += ' dp-start dp-single';
    const onClick  = future ? '' : `onclick="dpClick(new Date(${year},${month},${d}))"`;
    const onHover  = future ? '' : `onmouseenter="dpHover(new Date(${year},${month},${d}))" onmouseleave="dpLeave()"`;
    html += `<div class="${cls}" ${onClick} ${onHover}>${d}</div>`;
  }

  const total = firstDow + daysInMonth;
  const pad = total%7===0 ? 0 : 7-(total%7);
  for (let d=1; d<=pad; d++) html += `<div class="dp-day dp-other">${d}</div>`;
  html += '</div>';
  el.innerHTML = html;
}

function dpClick(date) {
  if (DP.stage === 0) {
    DP.tFrom = date; DP.tTo = null; DP.hover = null; DP.stage = 1;
  } else {
    DP.tTo = date; DP.hover = null; DP.stage = 0;
  }
  renderDp(); updateDpRangeInfo();
}
function dpHover(date) {
  if (DP.stage === 1) { DP.hover = date; renderDp(); updateDpRangeInfo(); }
}
function dpLeave() {
  // Intentionally keep hover so the range preview stays visible
  // when moving mouse toward the Apply button
}

// Close popup on outside click
document.addEventListener('click', e => {
  const wrap = document.getElementById('dp-wrap');
  if (wrap && !wrap.contains(e.target)) closeDp();
});

// ===== DATA STATE =====
let DATA = [], GEO_DATA = [], INSTALLS_TOTAL = 0, SOURCES_DATA = [];
let sortCol = 'total_events', sortAsc = false;

function find(name) { return DATA.find(d=>d.event_name===name)||{unique_devices:0,total_events:0}; }

// ===== RENDER =====
function renderAll() {
  renderKPI(); renderFunnel(); renderDonut(); renderChurn();
  renderTable(); renderGeo(); renderSources();
}

function renderKPI() {
  const maxU = Math.max(...DATA.map(d=>d.unique_devices), 0);
  const churn = ['Вышел из аккаунта','Открыл ссылку на удаление аккаунта','Удалил ТС']
    .reduce((s,n)=>s+find(n).unique_devices, 0);
  const zayvki = find('Открыл заявку').unique_devices;
  const tel = find('Нажал на телефон в заявке').unique_devices;
  const conv = zayvki>0 ? Math.round(tel/zayvki*100) : 0;
  const reg = find('Зарегистрировался').unique_devices;
  const totalEv = DATA.reduce((s,d)=>s+d.total_events, 0);
  document.getElementById('tbl-summary').textContent = `· ${DATA.length} событий · ${totalEv} действий`;

  const kpis = [
    { label:'Активных водителей',    val: maxU,            sub:'открывали приложение',            color:'var(--text-primary)' },
    // { label:'Уходят из приложения',  val: churn,           sub:'вышли или удалили акк.',           color:'#E24B4A' },
    { label:'Новых регистраций',     val: reg,             sub:'зарегистрировались',               color:'#639922' },
    { label:'Дозвонились до работы', val: conv+'%',        sub:'смотрели заявку → нажали звонок', color:'#FF5000' },
    { label:'Установок',             val: INSTALLS_TOTAL||'—', sub:'новых установок за период',   color:'#5B7FD4' },
  ];
  document.getElementById('kpi-grid').innerHTML = kpis.map(k=>`
    <div class="kpi">
      <div class="kpi-label">${k.label}</div>
      <div class="kpi-value" style="color:${k.color}">${k.val}</div>
      <div class="kpi-sub">${k.sub}</div>
    </div>`).join('');
}

function renderFunnel() {
  const steps = [
    { label:'Открыл фильтр',     val:find('Открыл фильтр').unique_devices },
    { label:'Открыл заявку',     val:find('Открыл заявку').unique_devices },
    { label:'Нажал на телефон',  val:find('Нажал на телефон в заявке').unique_devices },
  ];
  const max = Math.max(...steps.map(s=>s.val), 1);
  const colors = ['#FF5000','#FF7A3D','#FFB38A'];
  document.getElementById('funnel').innerHTML = steps.map((s,i)=>`
    <div class="funnel-step">
      <div class="funnel-label">${s.label}</div>
      <div class="funnel-bar-wrap">
        <div class="funnel-bar" style="width:${Math.round(s.val/max*100)}%;background:${colors[i]}">
          <span>${s.val}</span>
        </div>
      </div>
      <span class="funnel-conv">${i>0&&steps[i-1].val>0?'↓'+Math.round(s.val/steps[i-1].val*100)+'%':''}</span>
    </div>`).join('');
  const z=find('Открыл заявку').unique_devices, t=find('Нажал на телефон в заявке').unique_devices;
  document.getElementById('conv-rate').textContent = z>0 ? Math.round(t/z*100)+'%' : '—';
}

function renderDonut() {
  const inter = find('Использовал фильтр межгород').total_events;
  const city  = find('Использовал фильтр по городу').total_events;
  const total = inter+city;
  if (!total) {
    document.getElementById('donut-svg').innerHTML='';
    document.getElementById('donut-legend').innerHTML='<div style="font-size:12px;color:var(--text-tertiary)">Нет данных</div>';
    return;
  }
  const pct = Math.round(inter/total*100);
  const r=46,ri=28,cx=60,cy=60,TAU=2*Math.PI,a=inter/total*TAU,s=-Math.PI/2;
  function arc(s0,a0,col) {
    const x1=cx+r*Math.cos(s0),y1=cy+r*Math.sin(s0),x2=cx+r*Math.cos(s0+a0),y2=cy+r*Math.sin(s0+a0),
          xi1=cx+ri*Math.cos(s0),yi1=cy+ri*Math.sin(s0),xi2=cx+ri*Math.cos(s0+a0),yi2=cy+ri*Math.sin(s0+a0);
    return `<path d="M${x1.toFixed(1)},${y1.toFixed(1)} A${r},${r} 0 ${a0>Math.PI?1:0},1 ${x2.toFixed(1)},${y2.toFixed(1)} L${xi2.toFixed(1)},${yi2.toFixed(1)} A${ri},${ri} 0 ${a0>Math.PI?1:0},0 ${xi1.toFixed(1)},${yi1.toFixed(1)} Z" fill="${col}"/>`;
  }
  const dark=window.matchMedia('(prefers-color-scheme:dark)').matches;
  const bg=dark?'#1c1c1e':'#ffffff', txt=dark?'#f5f5f5':'#1a1a1a', sub=dark?'#a0a0a0':'#6b6b6b';
  document.getElementById('donut-svg').innerHTML=
    `${arc(s,a,'#FF5000')}${arc(s+a,TAU-a,'#B4B2A9')}
    <circle cx="${cx}" cy="${cy}" r="${ri-2}" fill="${bg}"/>
    <text x="${cx}" y="${cy-5}" text-anchor="middle" font-size="15" font-weight="600" fill="${txt}">${pct}%</text>
    <text x="${cx}" y="${cy+10}" text-anchor="middle" font-size="9" fill="${sub}">межгород</text>`;
  document.getElementById('donut-legend').innerHTML=`
    <div class="legend-row"><div class="legend-dot" style="background:#FF5000"></div><span class="legend-name">Межгород</span><span class="legend-val">${inter}</span><span class="legend-pct">${pct}%</span></div>
    <div class="legend-row"><div class="legend-dot" style="background:#B4B2A9"></div><span class="legend-name">По городу</span><span class="legend-val">${city}</span><span class="legend-pct">${100-pct}%</span></div>
    <div style="font-size:11px;color:var(--text-tertiary);margin-top:4px;">Событий с фильтрами: ${total}</div>`;
}

function renderChurn() {
  const items = [
    { label:'Вышел из аккаунта',  d:find('Вышел из аккаунта') },
    { label:'Удалил транспорт',   d:find('Удалил ТС') },
    { label:'Хотел удалить акк.', d:find('Открыл ссылку на удаление аккаунта') },
  ];
  const maxV = Math.max(...items.map(c=>c.d.unique_devices), 1);
  document.getElementById('churn-bars').innerHTML = items.map(c=>`
    <div class="churn-row">
      <div class="churn-label">${c.label}</div>
      <div class="churn-wrap"><div class="churn-bar" style="width:${Math.round(c.d.unique_devices/maxV*100)}%;background:#E24B4A;"><span class="churn-num">${c.d.unique_devices}</span></div></div>
      <div class="churn-total">${c.d.total_events}</div>
    </div>`).join('');
  const totalChurn = items.reduce((s,c)=>s+c.d.unique_devices, 0);
  const active = find('Открыл заявку').unique_devices||1;
  const hp = Math.round((1-totalChurn/active)*100);
  const scoreEl = document.getElementById('health-score');
  scoreEl.textContent = hp+'%';
  scoreEl.style.color = hp>=90?'#639922':hp>=75?'#BA7517':'#E24B4A';
  document.getElementById('health-label').textContent = `из ${find('Открыл заявку').unique_devices} активных водителей`;
}

function renderTable() {
  const rows = DATA.map(d=>({...d}));
  rows.sort((a,b)=>{
    const av=a[sortCol],bv=b[sortCol];
    return typeof av==='string'?(sortAsc?av.localeCompare(bv):bv.localeCompare(av)):(sortAsc?av-bv:bv-av);
  });
  const maxUD=Math.max(...rows.map(r=>r.unique_devices),1);
  const maxTE=Math.max(...rows.map(r=>r.total_events),1);
  document.getElementById('data-table').innerHTML=`
    <thead><tr>
      <th class="${sortCol==='event_name'?'sorted':''}" data-key="event_name">Действие в приложении${sortCol==='event_name'?` ${sortAsc?'↑':'↓'}`:''}</th>
      <th class="${sortCol==='unique_devices'?'sorted':''}" data-key="unique_devices" style="text-align:right">Водителей${sortCol==='unique_devices'?` ${sortAsc?'↑':'↓'}`:''}</th>
      <th class="${sortCol==='total_events'?'sorted':''}" data-key="total_events" style="text-align:right">Всего раз${sortCol==='total_events'?` ${sortAsc?'↑':'↓'}`:''}</th>
      <th style="text-align:left;min-width:100px">Активность</th>
    </tr></thead>
    <tbody>${rows.map(r=>`<tr>
      <td>${r.event_name}</td>
      <td class="num"><div style="display:flex;align-items:center;gap:8px;justify-content:flex-end;"><div class="mini-bar-wrap" style="width:44px;height:3px;background:var(--bg-secondary);border-radius:2px;overflow:hidden;"><div style="width:${Math.round(r.unique_devices/maxUD*100)}%;height:100%;background:#FF5000;border-radius:2px;"></div></div>${r.unique_devices}</div></td>
      <td class="num">${r.total_events}</td>
      <td><div style="width:${Math.round(r.total_events/maxTE*100)}%;max-width:120px;min-width:4px;height:6px;background:#FF5000;border-radius:3px;opacity:0.75;"></div></td>
    </tr>`).join('')}</tbody>`;
  document.querySelectorAll('th[data-key]').forEach(th=>{
    th.addEventListener('click',()=>{
      const k=th.getAttribute('data-key');
      sortCol===k ? sortAsc=!sortAsc : (sortCol=k, sortAsc=false);
      renderTable();
    });
  });
}

function renderGeo() {
  const el = document.getElementById('geo-content');
  if (!GEO_DATA || !GEO_DATA.length) {
    el.innerHTML = '<div style="font-size:12px;color:var(--text-tertiary)">Нет данных о географии</div>'; return;
  }
  const maxD = Math.max(...GEO_DATA.map(r=>r.drivers), 1);
  el.innerHTML = GEO_DATA.map((r,i)=>`
    <div class="geo-row">
      <div class="geo-rank">${i+1}</div>
      <div class="geo-name">${r.city}</div>
      <div class="geo-bar-wrap">
        <div class="geo-bar" style="width:${Math.round(r.drivers/maxD*100)}%">
          <span>${r.drivers}</span>
        </div>
      </div>
    </div>`).join('');
}

    'ГРУЗАП_Бот_ТГ__rustore': 'Бот ТГ (RuStore)',

    'ГРУЗАП_Журнал_ТГ': 'Журнал ТГ',
    'ГРУЗАП_Журнал_ТГ_rustore': 'Журнал ТГ (RuStore)',
    'ГРУЗАП_ТАПЛИНК_ru': 'TAPLINK',
    'ГРУЗАП_Таплинк': 'TAPLINK',
    'ГРУЗАП_MAX_ru': 'MAX',
    'ГРУЗАП_Кавказ_ru': 'Кавказ',
    'ГРУЗАП_Кавказ': 'Кавказ',
    'ГРУЗАП_Сибирь_ru': 'Сибирь',
    'ГРУЗАП_Сибирь': 'Сибирь',
    'ГРУЗАП_Южане_ru': 'Южане',

function renderSources() {
  const el = document.getElementById('sources-content');
  if (!SOURCES_DATA || !SOURCES_DATA.length) {
    el.innerHTML = '<div style="font-size:12px;color:var(--text-tertiary)">Нет данных об источниках</div>'; return;

    <div class="geo-row">
      <div class="geo-rank">${i+1}</div>
      <div class="geo-name" style="max-width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${label}">${label}</div>
      <div class="geo-bar-wrap">

          <span>${r.installs}</span>

      </div>

  }).join('');
}

// ===== WEBHOOK =====
const N8N_WEBHOOK  = 'https://n8n.gruz.app/webhook/gruzap-dashboard';
const N8N_ANALYTICS = 'https://n8n.gruz.app/webhook/gruzap-analytics';

function updatePeriodLabel() {
  const lo=DP.from, hi=DP.to;
  const s = sameDay(lo,hi) ? fmtFriendly(lo) : fmtFriendly(lo)+' — '+fmtFriendly(hi);
  document.getElementById('period-label-text').textContent = 'Данные: '+s+' · AppMetrica';
}

async function triggerRefresh() {
  const btn = document.getElementById('refresh-btn');
  btn.classList.add('loading');
  try {
    const res = await fetch(N8N_WEBHOOK, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ date_from: fmtISO(DP.from), date_to: fmtISO(DP.to) })
    });
    if (!res.ok) throw new Error('HTTP '+res.status);
    const response = await res.json();
    if (Array.isArray(response) && response.length > 0) {
      const d = response[0];
      if (d && d.events) {
        DATA = d.events;
        GEO_DATA = d.geo || [];
        INSTALLS_TOTAL = d.installs_total || 0;
        SOURCES_DATA = d.sources || [];
      } else {
        DATA = response; GEO_DATA = []; INSTALLS_TOTAL = 0; SOURCES_DATA = [];
      }
      updatePeriodLabel();
      renderAll();
    }
  } catch(e) { console.error('Webhook error:', e); }
  finally { btn.classList.remove('loading'); }
}

function openModal() {
  document.getElementById('modal-overlay').classList.add('show');
  document.getElementById('modal-period-label').textContent =
    sameDay(DP.from,DP.to) ? fmtFriendly(DP.from) : fmtFriendly(DP.from)+' — '+fmtFriendly(DP.to);
  document.getElementById('modal-body').innerHTML =
    '<div class="modal-loading"><div class="modal-loading-ring"></div>Собираю данные и анализирую…</div>';
}
function closeModal() { document.getElementById('modal-overlay').classList.remove('show'); }
function closeModalOutside(e) { if (e.target===document.getElementById('modal-overlay')) closeModal(); }

function mdToHtml(text) {
  return text
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/^#{1,3}\s+(.+)$/gm,'<strong>$1</strong>')
    .replace(/^[-•]\s+(.+)$/gm,'• $1')
    .replace(/\n/g,'<br>');
}

async function openAnalytics() {
  const btn = document.getElementById('ai-btn');
  btn.disabled = true;
  openModal();
  try {
    const res = await fetch(N8N_ANALYTICS, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ date_from: fmtISO(DP.from), date_to: fmtISO(DP.to), data: DATA })
    });
    if (!res.ok) throw new Error('HTTP '+res.status);
    const json = await res.json();
    const text = json.text || json.output || JSON.stringify(json);
    document.getElementById('modal-body').innerHTML = `<div class="modal-text">${mdToHtml(text)}</div>`;
  } catch(e) {
    document.getElementById('modal-body').innerHTML =
      `<div class="modal-text" style="color:#E24B4A">Не удалось получить анализ. Попробуйте ещё раз.<br><small>${e.message}</small></div>`;
  } finally { btn.disabled = false; }
}

document.addEventListener('keydown', e => { if (e.key==='Escape') { closeModal(); closeDp(); } });

// ===== INIT =====
// Set "Вчера" as active preset
document.querySelector('.preset-btn[data-preset="yesterday"]').classList.add('active');
document.getElementById('dp-label').textContent = dpLabelText();
triggerRefresh();
</script>
