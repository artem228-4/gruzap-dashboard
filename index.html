<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ГРУЗАП Аналитика</title>
<style>
:root{color-scheme:dark;--bg:#0f1114;--bg2:#171a1f;--card:#1d2127;--soft:#242932;--border:rgba(255,255,255,.08);--text:#f6f1ea;--muted:#a4abb4;--accent:#ff6a1a;--accent2:#ff9859;--cyan:#4bc2eb;--green:#71c07a;--red:#ff7575;--yellow:#f2c15d;--shadow:0 24px 60px rgba(0,0,0,.28);--radius:20px;--radius-sm:14px;--max:1440px}*{box-sizing:border-box}html,body{margin:0}body{font-family:"Aptos","Segoe UI Variable Text","Segoe UI",sans-serif;background:radial-gradient(circle at top left,rgba(255,106,26,.16),transparent 25%),radial-gradient(circle at top right,rgba(75,194,235,.1),transparent 26%),linear-gradient(180deg,#171a1f 0%,#0f1114 55%,#0b0d10 100%);color:var(--text)}.shell{max-width:var(--max);margin:0 auto;padding:24px}.hero{background:linear-gradient(135deg,rgba(255,106,26,.12),transparent 32%),rgba(20,23,28,.92);border:1px solid var(--border);border-radius:28px;padding:22px;box-shadow:var(--shadow)}.hero-top{display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:18px}.brand{display:flex;gap:14px;align-items:center}.mark{width:48px;height:48px;border-radius:14px;display:grid;place-items:center;background:linear-gradient(180deg,rgba(255,106,26,.2),rgba(255,106,26,.06));border:1px solid rgba(255,106,26,.16)}.eyebrow{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);margin-bottom:6px;display:flex;align-items:center;gap:8px}.eyebrow:before{content:"";width:6px;height:6px;border-radius:50%;background:var(--accent)}h1{margin:0;font-size:clamp(24px,3.8vw,34px);line-height:1.02;letter-spacing:-.04em;max-width:620px}.subtitle{margin:8px 0 0;max-width:620px;font-size:14px;line-height:1.55;color:#cfd5dc}.hero-meta{display:flex;gap:10px;align-items:center;flex-wrap:wrap}.chip{display:inline-flex;align-items:center;gap:8px;padding:9px 12px;border-radius:999px;border:1px solid var(--border);background:rgba(255,255,255,.03);font-size:12px;font-weight:600;color:#d8dde3}.dot{width:8px;height:8px;border-radius:50%;background:currentColor}.toolbar{display:grid;gap:14px}.row{display:flex;gap:12px;justify-content:space-between;align-items:center;flex-wrap:wrap}.tabs,.presets,.controls{display:inline-flex;gap:8px;align-items:center;padding:8px;border:1px solid var(--border);background:rgba(12,14,17,.5);border-radius:18px}.tab-btn,.preset-btn,.ghost,.primary{font:inherit;border:none;cursor:pointer;border-radius:12px;transition:.18s ease}.tab-btn,.preset-btn,.ghost{background:transparent;color:#d3d8de}.tab-btn{padding:12px 16px;min-width:164px;text-align:left;border:1px solid transparent}.tab-btn b{display:block;font-size:14px}.tab-btn span{display:block;font-size:12px;color:var(--muted);margin-top:3px}.tab-btn.active{background:linear-gradient(180deg,rgba(255,106,26,.22),rgba(255,106,26,.08));border-color:rgba(255,106,26,.2);transform:translateY(-1px)}.preset-btn{padding:10px 14px;font-size:13px;font-weight:600}.preset-btn.active{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12)}.controls{padding:10px 12px;flex-wrap:wrap}.field{display:grid;gap:4px;min-width:140px}.field label{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}input[type=date]{width:100%;padding:10px 12px;border-radius:12px;border:1px solid var(--border);background:rgba(255,255,255,.03);color:var(--text);font:inherit}.ghost,.primary{padding:12px 16px;font-size:13px;font-weight:700}.ghost{border:1px solid var(--border);background:rgba(255,255,255,.03)}.primary{color:#fff;background:linear-gradient(180deg,var(--accent2),var(--accent));box-shadow:0 12px 22px rgba(255,106,26,.24)}.signal{display:flex;justify-content:space-between;gap:12px;align-items:center;flex-wrap:wrap;padding:14px 16px;border:1px solid var(--border);background:rgba(255,255,255,.03);border-radius:18px;color:#d3d8de;font-size:13px}.signal-side{display:flex;gap:10px;align-items:center;flex-wrap:wrap}.pill{display:inline-flex;align-items:center;gap:8px;padding:8px 10px;border-radius:999px;border:1px solid var(--border);background:rgba(255,255,255,.04);font-size:12px;font-weight:700;color:#d8dde3}.muted{color:var(--muted)}.dashboard{margin-top:20px;display:grid;gap:16px}.kpis{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:14px}.kpi,.panel{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow)}.kpi{padding:18px}.kpi .label{font-size:11px;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);margin-bottom:12px}.kpi .value{font-size:clamp(28px,4vw,40px);line-height:.96;font-weight:800;letter-spacing:-.05em}.kpi .sub{margin-top:10px;font-size:13px;line-height:1.5;color:#d4dae1}.layout-two{display:grid;grid-template-columns:minmax(0,1.3fr) minmax(320px,.95fr);gap:16px}.layout-half{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:16px}.panel{padding:18px}.head{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;flex-wrap:wrap;margin-bottom:16px}.head h2{margin:0;font-size:18px;letter-spacing:-.03em}.head p{margin:6px 0 0;font-size:13px;line-height:1.5;color:var(--muted)}.stack,.leaders{display:grid;gap:12px}.item{display:grid;gap:8px;position:relative}.item-top{display:flex;justify-content:space-between;gap:12px;align-items:center;font-size:13px}.bar{height:12px;border-radius:999px;background:rgba(255,255,255,.05);overflow:hidden}.fill{height:100%;border-radius:inherit;background:linear-gradient(90deg,var(--accent),var(--accent2))}.fill.cyan{background:linear-gradient(90deg,#2caed7,#76dbff)}.fill.green{background:linear-gradient(90deg,#58b86e,#8ddf85)}.fill.yellow{background:linear-gradient(90deg,#dca433,#ffd46c)}.hint{position:relative;display:block}.hint-bubble{position:absolute;left:0;bottom:calc(100% + 10px);width:min(320px,calc(100vw - 48px));padding:12px 14px;border-radius:14px;border:1px solid rgba(255,255,255,.08);background:linear-gradient(180deg,rgba(24,28,33,.98),rgba(17,20,24,.98));box-shadow:0 18px 34px rgba(0,0,0,.32);color:#e4e9ef;font-size:12px;line-height:1.5;opacity:0;pointer-events:none;transform:translateY(6px);transition:.18s ease;z-index:3}.hint-bubble strong{display:block;margin-bottom:6px;color:var(--text);font-size:12px}.hint:hover .hint-bubble,.hint:focus-visible .hint-bubble{opacity:1;transform:translateY(0)}.ring-wrap{display:grid;place-items:center;min-height:250px}.ring-svg{width:220px;height:220px}.legend{display:grid;gap:10px;margin-top:10px}.legend-row{display:flex;justify-content:space-between;gap:10px;align-items:center;font-size:13px}.legend-left{display:flex;gap:10px;align-items:center}.legend-mark{width:10px;height:10px;border-radius:50%}.stats-band{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px}.stat{padding:14px;border-radius:16px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.04)}.stat b{display:block;font-size:24px;letter-spacing:-.04em;margin-bottom:6px}.stat span{display:block;font-size:12px;color:var(--muted);line-height:1.45}.trend{display:grid;grid-auto-flow:column;grid-auto-columns:minmax(10px,1fr);align-items:end;gap:8px;min-height:230px;margin-top:8px}.tcol{position:relative;display:flex;align-items:flex-end;justify-content:center}.tbar{width:100%;min-height:10px;border-radius:12px 12px 6px 6px;background:linear-gradient(180deg,rgba(255,152,89,.98),rgba(255,106,26,.72))}.tbar.cyan{background:linear-gradient(180deg,rgba(118,219,255,.98),rgba(44,174,215,.72))}.tlabel,.tvalue{position:absolute;left:50%;transform:translateX(-50%);white-space:nowrap;font-size:11px}.tlabel{bottom:-24px;color:var(--muted)}.tvalue{top:-22px;color:#d5dbe2}.table-wrap{overflow:auto;border-radius:16px;border:1px solid var(--border);background:rgba(255,255,255,.02)}table{width:100%;border-collapse:collapse;min-width:640px}th,td{padding:14px 16px;text-align:left;border-bottom:1px solid rgba(255,255,255,.05);font-size:13px}th{font-size:11px;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);background:rgba(255,255,255,.03)}td.num{text-align:right;font-variant-numeric:tabular-nums}.empty{padding:36px;border-radius:20px;border:1px dashed rgba(255,255,255,.18);background:linear-gradient(180deg,rgba(255,255,255,.04),rgba(255,255,255,.02))}.empty h3{margin:0 0 10px;font-size:22px}.empty p{margin:0;max-width:760px;line-height:1.7;color:#d1d7de}.modal-overlay{position:fixed;inset:0;display:none;place-items:center;padding:24px;background:rgba(0,0,0,.62);backdrop-filter:blur(10px);z-index:10}.modal-overlay.show{display:grid}.modal{width:min(760px,100%);max-height:min(86vh,920px);overflow:hidden;border-radius:26px;border:1px solid var(--border);background:linear-gradient(180deg,rgba(18,21,24,.98),rgba(15,17,20,.98));box-shadow:var(--shadow);display:grid;grid-template-rows:auto 1fr}.modal-head{display:flex;justify-content:space-between;gap:16px;align-items:flex-start;padding:22px 22px 18px;border-bottom:1px solid var(--border)}.modal-head h3{margin:0 0 6px;font-size:22px}.modal-body{overflow:auto;padding:22px;line-height:1.75;color:#d2d8de}.close{width:42px;height:42px;border-radius:12px;border:1px solid var(--border);background:rgba(255,255,255,.04);color:var(--text);font-size:20px;cursor:pointer}.loading{display:grid;justify-items:center;gap:14px;padding:36px 0;color:var(--muted)}.spinner{width:36px;height:36px;border-radius:50%;border:3px solid rgba(255,255,255,.1);border-top-color:var(--accent);animation:spin .8s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}.markdown p{margin:0 0 14px}.markdown strong{color:var(--text)}@media (max-width:1180px){.kpis{grid-template-columns:repeat(2,minmax(0,1fr))}.layout-two,.layout-half{grid-template-columns:1fr}}@media (max-width:820px){.shell{padding:16px}.hero{padding:18px;border-radius:22px}.hero-top{align-items:flex-start}.tabs{width:100%;overflow:auto}.tab-btn{min-width:150px}.controls{width:100%}.field{min-width:0;flex:1 1 140px}.stats-band,.kpis{grid-template-columns:1fr}.trend{gap:6px}.tlabel,.tvalue{font-size:10px}.hint-bubble{left:auto;right:0}}
</style>
</head>
<body>
<div class="shell">
<section class="hero">
<div class="hero-top">
<div class="brand"><div class="mark" aria-hidden="true"><svg width="24" height="24" viewBox="0 0 184 147" fill="none"><path d="M39.3334 0L0 67.2985V146.187H70.0017L132.229 83.9106V145.95H183.019V43.8759H79.9713V67.3253H115.659L98.6717 84.3272H23.4345V73.6535L52.7763 23.4518H183.019V0H39.3334Z" fill="#FF6A1A"></path></svg></div><div><div class="eyebrow">Грузап Analytics</div><h1>ГРУЗАП Аналитика</h1><p class="subtitle">AppMetrica, Яндекс Метрика и Direct в одном дашборде.</p></div></div>
<div class="hero-meta"><div class="chip"><span class="dot"></span><span id="live-status-text">Локальная сборка</span></div><div class="chip" id="source-chip">AppMetrica</div></div>
</div>
<div class="toolbar">
<div class="row"><div class="tabs" role="tablist" aria-label="Источники аналитики"><button class="tab-btn active" data-tab="appmetrica" role="tab" aria-selected="true"><b>AppMetrica</b><span>События приложения, установки, география</span></button><button class="tab-btn" data-tab="metrika" role="tab" aria-selected="false"><b>Яндекс Метрика</b><span>Сессии сайта, качество трафика, Telegram-переходы</span></button><button class="tab-btn" data-tab="direct" role="tab" aria-selected="false"><b>Яндекс Direct</b><span>Расход, клики, конверсии и эффективность по дням</span></button></div></div>
<div class="row"><div class="presets"><button class="preset-btn" data-preset="today">Сегодня</button><button class="preset-btn active" data-preset="yesterday">Вчера</button><button class="preset-btn" data-preset="week">7 дней</button><button class="preset-btn" data-preset="month">30 дней</button><button class="preset-btn" data-preset="quarter">Квартал</button></div><div class="controls"><div class="field"><label for="date-from">С</label><input id="date-from" type="date"></div><div class="field"><label for="date-to">По</label><input id="date-to" type="date"></div><button class="ghost" id="refresh-btn" type="button">Обновить</button><button class="primary" id="analytics-btn" type="button">AI-аналитика</button></div></div>
<div class="signal"><div class="signal-side"><strong id="period-label">Период: вчера</strong><span class="muted" id="period-note">Готов к запросу данных</span></div><div class="signal-side"><span class="pill" id="mode-pill">Режим: AppMetrica-only fallback</span><span class="pill" id="active-pill">Активная вкладка: AppMetrica</span></div></div>
</div>
</section>
<main class="dashboard" id="dashboard-content"></main>
</div>
<div class="modal-overlay" id="modal-overlay" aria-hidden="true"><div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title"><div class="modal-head"><div><h3 id="modal-title">AI-аналитика</h3><div class="muted" id="modal-subtitle">Источник и период</div></div><button class="close" id="modal-close" type="button" aria-label="Закрыть">×</button></div><div class="modal-body" id="modal-body"></div></div></div>
<script>
const ENDPOINTS={dashboard:'https://n8n.gruz.app/webhook/gruzap-dashboard',analytics:'https://n8n.gruz.app/webhook/gruzap-analytics'};
const SOURCE_META={appmetrica:{label:'AppMetrica',summary:'Мобильное приложение, установки, события и география'},metrika:{label:'Яндекс Метрика',summary:'Сайт, сессии, bounce rate, источники и Telegram-переходы'},direct:{label:'Яндекс Direct',summary:'Расход, показы, клики, CTR, CPA и конверсии'}};
const state={activeTab:'appmetrica',mode:'legacy',data:{appmetrica:null,metrika:null,direct:null},from:null,to:null};
const startOfDay=(d)=>new Date(d.getFullYear(),d.getMonth(),d.getDate());
const shiftDays=(d,n)=>{const x=new Date(d);x.setDate(x.getDate()+n);return x};
const fmtISO=(d)=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
const parseISO=(v)=>{if(!v)return null;const[a,b,c]=v.split('-').map(Number);return new Date(a,(b||1)-1,c||1)};
const sameDay=(a,b)=>a&&b&&fmtISO(a)===fmtISO(b);
const num=(v)=>{const n=Number(v);return Number.isFinite(n)?n:0};
const fmtNum=(v,d=0)=>new Intl.NumberFormat('ru-RU',{maximumFractionDigits:d,minimumFractionDigits:d}).format(num(v));
const fmtMoney=(v)=>`${fmtNum(v,v%1?2:0)} ₽`;
const fmtPct=(v,d=0)=>`${fmtNum(v,d)}%`;
const fmtMinutes=(v)=>`${fmtNum(v,v<10?1:0)} мин`;
const fmtFriendly=(d)=>d.toLocaleDateString('ru-RU',{day:'numeric',month:'short'});
const rangeLabel=(f,t)=>!f||!t?'Период не выбран':sameDay(f,t)?fmtFriendly(f):`${fmtFriendly(f)} — ${fmtFriendly(t)}`;
const metricCard=(l,v,s,t='',c='var(--text)')=>`<article class="kpi"><div class="label">${l}</div><div class="value" style="color:${c}">${v}</div><div class="sub">${s}</div>${t?`<div class="pill" style="margin-top:14px">${t}</div>`:''}</article>`;const bubble=(title,text)=>`<span class="hint-bubble"><strong>${title}</strong>${text}</span>`;
const barItem=(l,v,m,theme='',note='',tip='')=>`<div class="item hint" tabindex="0"><div class="item-top"><strong>${l}</strong><span class="muted">${note||fmtNum(v)}</span></div><div class="bar"><div class="fill ${theme}" style="width:${m>0?Math.max(6,Math.round(v/m*100)):0}%"></div></div>${bubble(l,tip||`Значение: ${fmtNum(v)}. Ширина полосы показывает долю относительно максимума в этом блоке.`)}</div>`;
const trendBars=(items,key,theme='',tipLabel='Значение за день')=>!items||!items.length?'<div class="empty"><h3>Нет временного ряда</h3><p>Данные появятся, когда workflow начнёт отдавать разбивку по дням.</p></div>':(()=>{const m=Math.max(...items.map(i=>num(i[key])),1);return `<div class="trend">${items.map(i=>{const v=num(i[key]);const h=Math.max(10,Math.round(v/m*100));const label=i.label||i.date||'';return `<div class="tcol hint" tabindex="0"><div class="tvalue">${fmtNum(v)}</div><div class="tbar ${theme}" style="height:${h}%"></div><div class="tlabel">${label}</div>${bubble(label||'День',`${tipLabel}: ${fmtNum(v)}. Высота столбца показывает относительный уровень внутри выбранного периода.`)}</div>`}).join('')}</div>`})();
const ring=(pct,a,b)=>{const p=Math.max(0,Math.min(100,num(pct)));const c=2*Math.PI*78;const on=c*(p/100);const off=c-on;return `<div class="ring-wrap"><div><svg class="ring-svg" viewBox="0 0 220 220" aria-hidden="true"><defs><linearGradient id="rg" x1="0" x2="1"><stop offset="0%" stop-color="#ff6a1a"></stop><stop offset="100%" stop-color="#ffb07b"></stop></linearGradient></defs><circle cx="110" cy="110" r="78" fill="none" stroke="rgba(255,255,255,.06)" stroke-width="24"></circle><circle cx="110" cy="110" r="78" fill="none" stroke="url(#rg)" stroke-width="24" stroke-linecap="round" transform="rotate(-90 110 110)" stroke-dasharray="${on} ${off}"></circle><circle cx="110" cy="110" r="56" fill="#14171b"></circle><text x="110" y="107" text-anchor="middle" font-size="40" font-weight="800" fill="#f6f1ea">${fmtPct(p)}</text><text x="110" y="128" text-anchor="middle" font-size="12" fill="#a4abb4">${a}</text></svg><div class="legend"><div class="legend-row"><div class="legend-left"><span class="legend-mark" style="background:var(--accent)"></span><span>${a}</span></div><strong>${fmtPct(p)}</strong></div><div class="legend-row"><div class="legend-left"><span class="legend-mark" style="background:#8a8f98"></span><span>${b}</span></div><strong>${fmtPct(100-p)}</strong></div></div></div></div>`};
function normalizeEventList(items){return Array.isArray(items)?items.map(i=>({event_name:i.event_name||i.name||'Событие',unique_devices:num(i.unique_devices),total_events:num(i.total_events)})):[]}
function prettifyInstallSource(name){let v=String(name||'').trim();if(!v||/^unknown$/i.test(v))return'Неизвестный источник';v=v.replace(/^ГРУЗАП[_\s-]*/i,'').replace(/^GRUZAP[_\s-]*/i,'');v=v.replace(/_/g,' ').replace(/\s+/g,' ').trim();v=v.replace(/\b(ru|rustore|googleplay)\b/gi,'').replace(/\s+/g,' ').trim();if(/^бот\s+тг$/i.test(v))v='Бот ТГ';else if(/^бот\s+тг\s+/i.test(v))v=v.replace(/^бот\s+тг\s+/i,'');v=v.toLocaleLowerCase('ru-RU').split(' ').filter(Boolean).map(part=>part==='тг'?'ТГ':part==='telegram'?'Telegram':part.charAt(0).toLocaleUpperCase('ru-RU')+part.slice(1)).join(' ');return v||'Неизвестный источник'}
function normalizeApp(raw){if(!raw)return null;const events=normalizeEventList(raw.events||raw.data||[]);const geo=Array.isArray(raw.geo)?raw.geo.map(i=>({city:i.city||'—',drivers:num(i.drivers)})):[];const sourceMap=new Map();if(Array.isArray(raw.sources))raw.sources.forEach(i=>{const key=prettifyInstallSource(i.name||'Не определено');sourceMap.set(key,(sourceMap.get(key)||0)+num(i.installs))});const sources=Array.from(sourceMap.entries()).map(([name,installs])=>({name,installs})).sort((a,b)=>b.installs-a.installs);const hours=Array.isArray(raw.hours)?raw.hours.map(i=>({hour:num(i.hour),events:num(i.events)})):[];const find=(name)=>events.find(i=>i.event_name===name)||{unique_devices:0,total_events:0};const active=events.length?Math.max(...events.map(i=>i.unique_devices),0):0;const openFilter=find('Открыл фильтр').unique_devices;const openOrder=find('Открыл заявку').unique_devices;const phoneTap=find('Нажал на телефон в заявке').unique_devices;const regs=find('Зарегистрировался').unique_devices;const inter=find('Использовал фильтр межгород').total_events;const city=find('Использовал фильтр по городу').total_events;const total=inter+city;return{events,geo,sources,hours,installs_total:num(raw.installs_total),summary:{active_users:active,open_filter:openFilter,open_order:openOrder,phone_tap:phoneTap,phone_conversion:openOrder?Math.round(phoneTap/openOrder*100):0,registrations:regs,route_intercity_percent:total?Math.round(inter/total*100):0,route_city_percent:total?100-Math.round(inter/total*100):0,total_events:events.reduce((s,i)=>s+i.total_events,0)}}}
function normalizeMetrika(raw){if(!raw)return null;const s=raw.summary||{};return{summary:{sessions:num(s.sessions),users:num(s.users),bounce_rate:num(s.bounce_rate),avg_session_min:num(s.avg_session_min),bot_sessions:num(s.bot_sessions),bot_activation_percent:num(s.bot_activation_percent)},series:Array.isArray(raw.series)?raw.series.map(i=>({label:i.label||i.date||'—',visits:num(i.visits),users:num(i.users)})):[],sources:Array.isArray(raw.sources)?raw.sources.map(i=>({name:i.name||'Источник',visits:num(i.visits),users:num(i.users)})):[],bot_pages:Array.isArray(raw.bot_pages)?raw.bot_pages.map(i=>({name:i.name||i.url||'Страница',visits:num(i.visits),users:num(i.users)})):[],warnings:Array.isArray(raw.warnings)?raw.warnings:[]}}
function normalizeDirect(raw){if(!raw)return null;const s=raw.summary||{};return{summary:{spend:num(s.spend),impressions:num(s.impressions),clicks:num(s.clicks),ctr:num(s.ctr),avg_cpc:num(s.avg_cpc),conversions:num(s.conversions),cpa:num(s.cpa),cr:num(s.cr)},daily:Array.isArray(raw.daily)?raw.daily.map(i=>({date:i.date||i.label||'—',spend:num(i.spend),impressions:num(i.impressions),clicks:num(i.clicks),ctr:num(i.ctr),avg_cpc:num(i.avg_cpc),conversions:num(i.conversions),cpa:num(i.cpa)})):[],warnings:Array.isArray(raw.warnings)?raw.warnings:[]}}
function normalizeResponse(raw){const p=Array.isArray(raw)?raw[0]:raw;if(!p)return{mode:'legacy',data:{appmetrica:null,metrika:null,direct:null}};if(p.appmetrica||p.metrika||p.direct)return{mode:'combined',data:{appmetrica:normalizeApp(p.appmetrica),metrika:normalizeMetrika(p.metrika),direct:normalizeDirect(p.direct)}};if(p.events||p.geo||p.sources)return{mode:'legacy',data:{appmetrica:normalizeApp(p),metrika:null,direct:null}};return{mode:'legacy',data:{appmetrica:null,metrika:null,direct:null}}}
const sourceData=()=>state.data[state.activeTab];
function updateHeaderMeta(){const src=SOURCE_META[state.activeTab],legacy=state.mode!=='combined';document.getElementById('source-chip').textContent=src.label;document.getElementById('active-pill').textContent=`Активная вкладка: ${src.label}`;document.getElementById('period-label').textContent=`Период: ${rangeLabel(state.from,state.to)}`;document.getElementById('period-note').textContent=src.summary;document.getElementById('mode-pill').textContent=legacy?'Режим: live webhook пока без Метрики и Direct':'Режим: полный мульти-источник';document.getElementById('live-status-text').textContent=legacy?'Локальная сборка':'Все источники подключены'}
function appTab(d){if(!d)return `<section class="empty"><h3>AppMetrica пока не ответила</h3><p>После ответа источника сюда автоматически подтянутся события, воронка, география и установки.</p></section>`;const maxGeo=Math.max(...d.geo.map(i=>i.drivers),1),maxSrc=Math.max(...d.sources.map(i=>i.installs),1),events=d.events.slice().sort((a,b)=>b.total_events-a.total_events);return `<section class="kpis">${metricCard('Активные водители',fmtNum(d.summary.active_users),'Максимум уникальных водителей по ключевым событиям',`${fmtNum(d.summary.total_events)} действий за период`,'var(--accent)')}${metricCard('Новые установки',fmtNum(d.installs_total),'Сумма установок из AppMetrica install-источников',`${d.sources.length?'Топ-источников: '+d.sources.length:'Нет разбивки по источникам'}`,'var(--cyan)')}${metricCard('Регистрации',fmtNum(d.summary.registrations),'Водители, которые дошли до регистрации',`${fmtPct(d.summary.phone_conversion)} дошли до нажатия на телефон`,'var(--green)')}${metricCard('Переход в звонок',fmtPct(d.summary.phone_conversion),'Конверсия из открытия заявки в нажатие на телефон',`${fmtNum(d.summary.phone_tap)} звонков из ${fmtNum(d.summary.open_order)} просмотров`,'var(--yellow)')}</section><section class="layout-two"><article class="panel"><div class="head"><div><h2>Продуктовая воронка водителя</h2><p>Путь от фильтра до контакта с заявкой.</p></div><div class="pill">App funnel</div></div><div class="stack">${[['Открыл фильтр',d.summary.open_filter],['Открыл заявку',d.summary.open_order],['Нажал на телефон',d.summary.phone_tap]].map((s,i,a)=>{const prev=i?a[i-1][1]:s[1];return `<div class="item"><div class="item-top"><strong>${s[0]}</strong><span class="muted">${fmtNum(s[1])}</span></div><div class="bar"><div class="fill" style="width:${Math.max(8,Math.round(s[1]/Math.max(...a.map(x=>x[1]),1)*100))}%"></div></div><div class="muted">${i&&prev?Math.round(s[1]/prev*100)+'% от предыдущего':'Верх воронки'}</div></div>`}).join('')}</div></article><article class="panel"><div class="head"><div><h2>Маршруты поиска</h2><p>Доля межгорода против городских перевозок.</p></div><div class="pill">Routing mix</div></div>${ring(d.summary.route_intercity_percent,'Межгород','Город')}</article></section><section class="layout-half"><article class="panel"><div class="head"><div><h2>География активации</h2><p>Города с наибольшей продуктовой активностью.</p></div><div class="pill">Geo top</div></div><div class="leaders">${d.geo.length?d.geo.map(i=>barItem(i.city,i.drivers,maxGeo,'',fmtNum(i.drivers),`${fmtNum(i.drivers)} активных водителей из этого города за выбранный период.`)).join(''):'<div class="empty"><h3>Нет географии</h3><p>После ответа AppMetrica здесь появятся города и активность по ним.</p></div>'}</div></article><article class="panel"><div class="head"><div><h2>Источники установок</h2><p>Какие каналы приводят установки приложения.</p></div><div class="pill">Install mix</div></div><div class="leaders">${d.sources.length?d.sources.map(i=>barItem(i.name,i.installs,maxSrc,'cyan',fmtNum(i.installs),`${fmtNum(i.installs)} установок из этого источника. Полоса показывает долю относительно самого крупного источника.`)).join(''):'<div class="empty"><h3>Нет источников</h3><p>Разбивка по install-кампаниям появится после ответа install-ветки.</p></div>'}</div></article></section><article class="panel"><div class="head"><div><h2>Топ продуктовых событий</h2><p>Низкоуровневый слой AppMetrica-вкладки.</p></div><div class="pill">${fmtNum(events.length)} событий</div></div><div class="table-wrap"><table><thead><tr><th>Событие</th><th class="num">Уникальных водителей</th><th class="num">Всего действий</th></tr></thead><tbody>${events.map(i=>`<tr><td>${i.event_name}</td><td class="num">${fmtNum(i.unique_devices)}</td><td class="num">${fmtNum(i.total_events)}</td></tr>`).join('')}</tbody></table></div></article>`}
function metrikaTab(d){if(!d)return `<section class="empty"><h3>Вкладка Метрики уже готова, но live workflow её ещё не отдаёт</h3><p>HTML уже ждёт объект <strong>metrika</strong> с summary, series, sources и bot_pages.</p></section>`;const maxSrc=Math.max(...d.sources.map(i=>i.visits),1),maxBot=Math.max(...d.bot_pages.map(i=>i.visits),1);return `<section class="kpis">${metricCard('Сессии сайта',fmtNum(d.summary.sessions),'Все визиты за выбранный период',`${fmtNum(d.summary.users)} пользователей`,'var(--cyan)')}${metricCard('Показатель отказов',fmtPct(d.summary.bounce_rate,1),'Качество посадки и соответствие ожиданиям трафика',d.summary.bounce_rate>60?'Нужно снижать bounce rate':'Поведение пользователей выглядит стабильно',d.summary.bounce_rate>60?'var(--red)':'var(--green)')}${metricCard('Средняя сессия',fmtMinutes(d.summary.avg_session_min),'Среднее время визита на сайте','Сигнал к качеству лендинга и оффера','var(--yellow)')}${metricCard('Telegram-активация',fmtPct(d.summary.bot_activation_percent),'Доля бот-переходов от общего объёма сессий',`${fmtNum(d.summary.bot_sessions)} сессий через Telegram/startURL`,'var(--accent)')}</section><section class="layout-two"><article class="panel"><div class="head"><div><h2>Ритм посещаемости по дням</h2><p>Серия для провалов и всплесков по сессиям.</p></div><div class="pill">Visits trend</div></div>${trendBars(d.series,'visits','cyan','Сессии сайта за день')}</article><article class="panel"><div class="head"><div><h2>Качество веб-потока</h2><p>Быстрый слой для руководителя.</p></div><div class="pill">Quality layer</div></div><div class="stats-band"><div class="stat"><b>${fmtNum(d.summary.sessions)}</b><span>Всего сессий в Яндекс Метрике</span></div><div class="stat"><b>${fmtPct(d.summary.bounce_rate,1)}</b><span>Отказы. Чем ниже, тем лучше посадка.</span></div><div class="stat"><b>${fmtMinutes(d.summary.avg_session_min)}</b><span>Среднее время сессии и глубина внимания.</span></div></div>${d.warnings.length?`<div class="leaders" style="margin-top:16px">${d.warnings.map(i=>`<div class="pill">${i}</div>`).join('')}</div>`:''}</article></section><section class="layout-half"><article class="panel"><div class="head"><div><h2>Источники веб-трафика</h2><p>Какие каналы формируют посещаемость.</p></div><div class="pill">Source mix</div></div><div class="leaders">${d.sources.length?d.sources.map(i=>barItem(i.name,i.visits,maxSrc,'cyan',`${fmtNum(i.visits)} визитов`,`${fmtNum(i.visits)} визитов и ${fmtNum(i.users)} пользователей из этого источника за период.`)).join(''):'<div class="empty"><h3>Нет источников</h3><p>Добавьте metrika.sources в payload workflow.</p></div>'}</div></article><article class="panel"><div class="head"><div><h2>Telegram и bot entry pages</h2><p>Страницы, с которых люди переходили в Telegram.</p></div><div class="pill">Telegram paths</div></div><div class="leaders">${d.bot_pages.length?d.bot_pages.map(i=>barItem(i.name,i.visits,maxBot,'yellow',`${fmtNum(i.visits)} визитов / ${fmtNum(i.users)} пользователей`,`${fmtNum(i.visits)} визитов и ${fmtNum(i.users)} пользователей по этому startURL. Полоса показывает долю среди всех Telegram-переходов.`)).join(''):'<div class="empty"><h3>За выбранный период Telegram-переходов не найдено</h3><p>Это не ошибка. За выбранный период Метрика по фильтру telegram / t.me вернула 0 строк, поэтому блок честно пустой.</p></div>'}</div></article></section>`}
function directTab(d){if(!d)return `<section class="empty"><h3>Вкладка Direct уже собрана, но live workflow её ещё не публикует</h3><p>Интерфейс уже ждёт объект <strong>direct</strong> с summary и daily.</p></section>`;const s=d.summary,rows=d.daily.length?d.daily:[];return `<section class="kpis">${metricCard('Расход',fmtMoney(s.spend),'Общий spend по Яндекс Direct за период',s.cpa?`CPA ${fmtMoney(s.cpa)}`:'CPA пока не считается','var(--green)')}${metricCard('Показы',fmtNum(s.impressions),'Сколько раз реклама была показана аудитории',`${fmtNum(s.clicks)} кликов`,'var(--cyan)')}${metricCard('CTR',fmtPct(s.ctr,2),'Отношение кликов к показам',s.ctr<1?'Низкий CTR, надо усиливать креатив':'Кликбельность в рабочем диапазоне',s.ctr<1?'var(--red)':'var(--accent)')}${metricCard('Конверсии',fmtNum(s.conversions),'Целевые действия из рекламного трафика',s.cpa?`Цена конверсии ${fmtMoney(s.cpa)}`:'Цена конверсии пока не определена','var(--yellow)')}</section><section class="layout-two"><article class="panel"><div class="head"><div><h2>Дневная динамика расхода</h2><p>График расхода по дням для скачков ставок и открутки.</p></div><div class="pill">Daily spend</div></div>${trendBars(rows.map(i=>({...i,label:i.date.slice(5)})),'spend','','Расход по Direct за день')}</article><article class="panel"><div class="head"><div><h2>Эффективность закупки</h2><p>Короткая витрина для руководителя.</p></div><div class="pill">Efficiency</div></div><div class="stats-band"><div class="stat"><b>${fmtMoney(s.avg_cpc)}</b><span>Средняя цена клика</span></div><div class="stat"><b>${fmtPct(s.cr,2)}</b><span>Конверсия из клика в целевое действие</span></div><div class="stat"><b>${s.cpa?fmtMoney(s.cpa):'н/д'}</b><span>Средняя цена конверсии</span></div></div>${d.warnings.length?`<div class="leaders" style="margin-top:16px">${d.warnings.map(i=>`<div class="pill">${i}</div>`).join('')}</div>`:''}</article></section><article class="panel"><div class="head"><div><h2>Таблица по дням</h2><p>Линейный слой для проверки totals и дневной эффективности.</p></div><div class="pill">${fmtNum(rows.length)} строк</div></div><div class="table-wrap"><table><thead><tr><th>Дата</th><th class="num">Расход</th><th class="num">Показы</th><th class="num">Клики</th><th class="num">CTR</th><th class="num">CPC</th><th class="num">Конверсии</th><th class="num">CPA</th></tr></thead><tbody>${rows.length?rows.map(i=>`<tr><td>${i.date}</td><td class="num">${fmtMoney(i.spend)}</td><td class="num">${fmtNum(i.impressions)}</td><td class="num">${fmtNum(i.clicks)}</td><td class="num">${fmtPct(i.ctr,2)}</td><td class="num">${fmtMoney(i.avg_cpc)}</td><td class="num">${fmtNum(i.conversions)}</td><td class="num">${i.cpa?fmtMoney(i.cpa):'н/д'}</td></tr>`).join(''):'<tr><td colspan="8">Дневной ряд пока пуст. После публикации workflow таблица заполнится автоматически.</td></tr>'}</tbody></table></div></article>`}
function render(){updateHeaderMeta();const d=sourceData(),root=document.getElementById('dashboard-content');root.innerHTML=state.activeTab==='appmetrica'?appTab(d):state.activeTab==='metrika'?metrikaTab(d):directTab(d)}
async function triggerRefresh(){document.getElementById('refresh-btn').disabled=true;document.getElementById('period-note').textContent='Запрашиваю данные из workflow…';try{const res=await fetch(ENDPOINTS.dashboard,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({date_from:fmtISO(state.from),date_to:fmtISO(state.to)})});if(!res.ok)throw new Error(`HTTP ${res.status}`);const payload=await res.json();const n=normalizeResponse(payload);state.mode=n.mode;state.data=n.data}catch(error){console.error(error)}finally{document.getElementById('refresh-btn').disabled=false;render()}}
function mdToHtml(text){return String(text||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/^###\s+(.+)$/gm,'<p><strong>$1</strong></p>').replace(/^##\s+(.+)$/gm,'<p><strong>$1</strong></p>').replace(/^#\s+(.+)$/gm,'<p><strong>$1</strong></p>').replace(/^[-•]\s+(.+)$/gm,'<p>• $1</p>').replace(/\n\n+/g,'</p><p>').replace(/\n/g,'<br>')}
function openModal(content,title,subtitle){document.getElementById('modal-title').textContent=title;document.getElementById('modal-subtitle').textContent=subtitle;document.getElementById('modal-body').innerHTML=content;document.getElementById('modal-overlay').classList.add('show');document.getElementById('modal-overlay').setAttribute('aria-hidden','false')}
function closeModal(){document.getElementById('modal-overlay').classList.remove('show');document.getElementById('modal-overlay').setAttribute('aria-hidden','true')}
async function openAnalytics(){const data=sourceData(),src=SOURCE_META[state.activeTab];if(!data){openModal('<div class="empty"><h3>Пока нечего анализировать</h3><p>Эта вкладка уже готова визуально, но источник ещё не начал отдавать данные из workflow.</p></div>','AI-аналитика',`${src.label} · ${rangeLabel(state.from,state.to)}`);return}const legacyApp=state.mode==='legacy'&&state.activeTab==='appmetrica';const unsupported=state.mode==='legacy'&&state.activeTab!=='appmetrica';if(unsupported){openModal('<div class="empty"><h3>Live analytics пока только для AppMetrica</h3><p>UI уже готов к анализу Метрики и Direct, но live workflow ещё не обновлён. После публикации локального workflow AI-аналитика начнёт работать и для этих вкладок.</p></div>','AI-аналитика',`${src.label} · ${rangeLabel(state.from,state.to)}`);return}openModal('<div class="loading"><div class="spinner"></div><div>Собираю данные и готовлю аналитический вывод…</div></div>','AI-аналитика',`${src.label} · ${rangeLabel(state.from,state.to)}`);try{const body=legacyApp?{date_from:fmtISO(state.from),date_to:fmtISO(state.to),data:data.events}:{tab:state.activeTab,date_from:fmtISO(state.from),date_to:fmtISO(state.to),data};const res=await fetch(ENDPOINTS.analytics,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});if(!res.ok)throw new Error(`HTTP ${res.status}`);const payload=await res.json();const text=payload.text||payload.output||payload.report_markdown||JSON.stringify(payload,null,2);openModal(`<div class="markdown"><p>${mdToHtml(text)}</p></div>`,'AI-аналитика',`${src.label} · ${rangeLabel(state.from,state.to)}`)}catch(error){openModal(`<div class="empty"><h3>Не удалось получить AI-анализ</h3><p>${error.message}</p></div>`,'AI-аналитика',`${src.label} · ${rangeLabel(state.from,state.to)}`)}}
function bind(){document.querySelectorAll('.tab-btn').forEach(btn=>btn.addEventListener('click',()=>{state.activeTab=btn.dataset.tab;document.querySelectorAll('.tab-btn').forEach(x=>{const a=x===btn;x.classList.toggle('active',a);x.setAttribute('aria-selected',a?'true':'false')});render()}));document.querySelectorAll('.preset-btn').forEach(btn=>btn.addEventListener('click',()=>setPreset(btn.dataset.preset)));document.getElementById('date-from').addEventListener('change',customDates);document.getElementById('date-to').addEventListener('change',customDates);document.getElementById('refresh-btn').addEventListener('click',triggerRefresh);document.getElementById('analytics-btn').addEventListener('click',openAnalytics);document.getElementById('modal-close').addEventListener('click',closeModal);document.getElementById('modal-overlay').addEventListener('click',e=>{if(e.target===document.getElementById('modal-overlay'))closeModal()});document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal()})}
function customDates(){const f=parseISO(document.getElementById('date-from').value),t=parseISO(document.getElementById('date-to').value);if(!f||!t)return;state.from=f<t?f:t;state.to=f<t?t:f;document.querySelectorAll('.preset-btn').forEach(b=>b.classList.remove('active'));updateHeaderMeta();triggerRefresh()}
function setPreset(key){const today=startOfDay(new Date()),y=shiftDays(today,-1);let range={from:y,to:y};if(key==='today')range={from:today,to:today};if(key==='week')range={from:shiftDays(today,-7),to:y};if(key==='month')range={from:shiftDays(today,-30),to:y};if(key==='quarter')range={from:shiftDays(today,-90),to:y};state.from=range.from;state.to=range.to;document.getElementById('date-from').value=fmtISO(range.from);document.getElementById('date-to').value=fmtISO(range.to);document.querySelectorAll('.preset-btn').forEach(b=>b.classList.toggle('active',b.dataset.preset===key));updateHeaderMeta();triggerRefresh()}
function init(){bind();setPreset('yesterday')}
init();
</script>
